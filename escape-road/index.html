<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="25011401/theme/game.css">
    <title>Escape Road</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #unity-container { width: 100%; height: 100%; position: absolute; background: #000; }
        #unity-canvas { width: 100%; height: 100%; }
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 999; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; color: white; font-family: sans-serif;
        }
        .play-btn {
            padding: 15px 35px; font-size: 22px; background: #ff4400; 
            color: white; border: none; border-radius: 50px; cursor: pointer;
        }
    </style>

    <script>
        // 1. FIXED MOCK SDK (Matches Unity's expectations exactly)
        window.GmSoft = {
            Init: function() { return Promise.resolve(); },
            // Changed to accept no parameters to fix the "requires 1" error
            SetParam: function() { 
                console.log("SDK: SetParam called (No args)"); 
                return "true"; 
            },
            ShowAd: function(callback) {
                console.log("SDK: Ad skipped");
                if (typeof callback === 'function') callback();
            },
            LogEvent: function() { },
            // Some versions require this to return "true" or "1" to proceed
            GetParam: function() { return "true"; }
        };

        // 2. FAKE FIREBASE (Stops analytics crashes)
        window.firebase = {
            initializeApp: function() { 
                return { analytics: () => ({ logEvent: () => {} }), firestore: () => {}, auth: () => {} }; 
            }
        };

        // 3. SILENT REDIRECT BLOCKER (Non-crashing version)
        // We use a simple interval to catch and stop redirects instead of freezing the property
        let initialPath = window.location.href;
        setInterval(() => {
            if (window.location.href !== initialPath && !window.location.href.includes(window.location.hostname)) {
                window.stop(); 
                window.location.href = initialPath;
            }
        }, 500);
    </script>
</head>

<body>
    <div id="unity-container">
        <canvas id="unity-canvas"></canvas>
    </div>

    <div id="loading-overlay" onclick="startLoading()">
        <img src="25011401/logo.png" style="width: 200px; margin-bottom: 20px;">
        <div id="status-text" style="margin-bottom: 20px;">Click to Start Game</div>
        <button class="play-btn" id="load-btn">PLAY NOW</button>
    </div>

    <script>
        const buildFolder = "25011401/Build";
        const loaderUrl = buildFolder + "/escape-road-v25011401.loader.js";

        const config = {
            dataUrl: buildFolder + "/escape-road-v25011401.data.unityweb",
            frameworkUrl: buildFolder + "/escape-road-v25011401.framework.js.unityweb",
            codeUrl: buildFolder + "/escape-road-v25011401.wasm.unityweb",
            streamingAssetsUrl: "25011401/StreamingAssets",
            companyName: "DefaultCompany",
            productName: "Escape Road",
            productVersion: "25011401",
            eventLog: false,
            buildAPI: ""
        };

        function startLoading() {
            const btn = document.getElementById("load-btn");
            const status = document.getElementById("status-text");
            
            btn.style.display = "none";
            status.innerText = "Loading Assets... (0%)";

            // Fix Sound for Chrome
            if (window.AudioContext || window.webkitAudioContext) {
                (new (window.AudioContext || window.webkitAudioContext)()).resume();
            }

            const script = document.createElement("script");
            script.src = loaderUrl;
            script.onload = () => {
                createUnityInstance(document.querySelector("#unity-canvas"), config, (progress) => {
                    status.innerText = "Loading Assets... (" + Math.round(100 * progress) + "%)";
                }).then((unityInstance) => {
                    document.getElementById("loading-overlay").style.display = "none";
                    window.unityInstance = unityInstance;
                }).catch((err) => {
                    alert("Unity Load Error: " + err);
                });
            };
            document.body.appendChild(script);
        }
    </script>
</body>
</html>
