<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="25011401/theme/game.css">
    <title>Escape Road</title>
    
    <style type="text/css">
        .jss1:before {
            top: 0; width: 100%; height: 100%; content: ""; display: block;
            filter: blur(16px); opacity: .5; z-index: 0; position: absolute;
            background-size: cover; background-image: url("25011401/loading.png");
        }
    </style> 

    <!-- 1. LIGHTWEIGHT MOCK SDK & REDIRECT SHIELD -->
    <script>
        // Stop the page from being redirected by scripts
        window.onbeforeunload = function() { return false; };
        window.location.replace = function(url) { console.log("Blocked Redirect:", url); };

        // Fake GmSoft SDK - Matches exactly what the Unity Console requested
        window.GmSoft = {
            Init: function() { return Promise.resolve(); },
            SetParam: function(p) { console.log("Mock SDK SetParam:", p); },
            ShowAd: function(type, cb) { console.log("Ad Blocked"); if(cb) cb(); },
            LogEvent: function(e) { },
            GetParam: function() { return ""; }
        };

        // Fake Firebase so it doesn't crash trying to log analytics
        window.firebase = {
            initializeApp: function() { return { analytics: () => ({ logEvent: () => {} }) }; }
        };
    </script>
</head>

<body>
<div id="unity-container" style="display: none; width: 100%; height: 100%; position: absolute;">
    <canvas id="unity-canvas" style="width: 100%; height: 100%;"></canvas> 
</div>

<div id="loadingBlock">
    <div class="jss31 jss34 jss1">
        <div class="spinner"></div>
        <div class="jss31 jss34 jss48" style="flex: 1 1 0%;">
            <div class="jss32">
                <div class="jss123"><img src="25011401/logo.png" style="width: 200px;"></div>
            </div>
        </div>
        <div class="jss31 jss34" style="flex: 3 1 0%;">
            <div class="gameloader-game-name">Escape Road</div>
            <div class="gameloader-progressbar">
                <div class="gameloader-progressbar-progress" id="progress_fill" style="width: 0%;"></div>
            </div>
            <div id="loader_text" style="color: white; margin-top: 10px;">Initializing Engine...</div>
        </div>
    </div>
</div>

<script>
    var versionFolder = "25011401/";
    var buildUrl = versionFolder + "Build";
    var loaderUrl = buildUrl + "/escape-road-v25011401.loader.js";
    
    var config = {
        dataUrl: buildUrl + "/escape-road-v25011401.data.unityweb",
        frameworkUrl: buildUrl + "/escape-road-v25011401.framework.js.unityweb",
        codeUrl: buildUrl + "/escape-road-v25011401.wasm.unityweb",
        streamingAssetsUrl: versionFolder + "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "Escape Road",
        productVersion: "25011401",
        eventLog: false,
        buildAPI: ""
    };

    var canvas = document.querySelector("#unity-canvas");
    var loadingBar = document.querySelector("#loadingBlock");
    var progressBarFull = document.querySelector("#progress_fill");
    var progressText = document.querySelector("#loader_text");

    var script = document.createElement("script");
    script.src = loaderUrl;
    script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
            progressBarFull.style.width = 100 * progress + "%";
            progressText.innerText = "Loading Assets: " + Math.round(progress * 100) + "%";
        }).then((unityInstance) => {
            loadingBar.style.display = "none";
            document.getElementById("unity-container").style.display = "block";
            window.unityInstance = unityInstance;
        }).catch((message) => {
            console.error("Unity Error:", message);
        });
    };
    document.body.appendChild(script);
</script>
</body>
</html>
