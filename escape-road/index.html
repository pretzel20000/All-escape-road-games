<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="25011401/theme/game.css">
    <title>Escape Road</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; height: 100vh; width: 100vw; }
        #unity-container { width: 100%; height: 100%; position: absolute; top:0; left:0; }
        #unity-canvas { width: 100% !important; height: 100% !important; background: #000; }
        
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 999; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            color: white; font-family: 'Fredoka', sans-serif; cursor: pointer;
        }
        .play-btn {
            padding: 18px 45px; font-size: 26px; background: #ff4400; 
            color: white; border: none; border-radius: 50px; cursor: pointer;
            font-weight: bold; box-shadow: 0 5px 15px rgba(255,68,0,0.4);
        }
        /* Hidden elements to stop "addEventListener" crashes */
        #ads-container, #banner-container, #more-games-btn { display: none !important; }
    </style>

    <script>
        // 1. THE "UNIVERSAL MOCK" SDK
        // This accepts any number of arguments and returns "true" to satisfy Unity
        const mockFunc = function() { 
            console.log("SDK Call:", arguments); 
            return "true"; 
        };

        window.GmSoft = {
            Init: function() { return Promise.resolve("true"); },
            SetParam: mockFunc,
            GetParam: function() { return "true"; },
            ShowAd: function() {
                // If the game passes a callback, we MUST call it or the game freezes
                for(let i=0; i<arguments.length; i++) {
                    if(typeof arguments[i] === 'function') arguments[i]();
                }
                return "true";
            },
            LogEvent: mockFunc,
            OnEvent: mockFunc,
            on: mockFunc
        };

        // 2. PREVENT REDIRECTS WITHOUT CRASHING
        // We don't redefine the property (which causes errors), we just stop the page
        window.onbeforeunload = function() { return null; };
        
        // Simple logic to keep the user on the page if a script tries to hijack it
        let lockUrl = window.location.href;
        setInterval(() => {
            if (window.location.href !== lockUrl && !window.location.href.includes(window.location.hostname)) {
                window.stop();
                window.location.href = lockUrl;
            }
        }, 200);

        // 3. FAKE FIREBASE
        window.firebase = {
            initializeApp: function() { 
                return { analytics: () => ({ logEvent: () => {} }), firestore: () => ({ collection: () => ({}) }), auth: () => ({}) }; 
            }
        };
    </script>
</head>

<body>
    <!-- Dummy elements needed by the game's obfuscated scripts -->
    <div id="ads-container"></div>
    <div id="banner-container"></div>
    <div id="more-games-btn"></div>

    <div id="unity-container">
        <canvas id="unity-canvas"></canvas>
    </div>

    <div id="loading-overlay" onclick="startLoading()">
        <img src="25011401/logo.png" style="width: 220px; margin-bottom: 30px;">
        <div id="status-text" style="margin-bottom: 20px; font-size: 18px;">Ready to Play</div>
        <button class="play-btn" id="load-btn">START GAME</button>
    </div>

    <script>
        // Path configuration
        const buildFolder = "25011401/Build";
        const loaderUrl = buildFolder + "/escape-road-v25011401.loader.js";

        const config = {
            dataUrl: buildFolder + "/escape-road-v25011401.data.unityweb",
            frameworkUrl: buildFolder + "/escape-road-v25011401.framework.js.unityweb",
            codeUrl: buildFolder + "/escape-road-v25011401.wasm.unityweb",
            streamingAssetsUrl: "25011401/StreamingAssets",
            companyName: "Unity",
            productName: "Escape Road",
            productVersion: "25011401",
            // Disable tracking
            eventLog: false,
            buildAPI: ""
        };

        function startLoading() {
            const btn = document.getElementById("load-btn");
            const status = document.getElementById("status-text");
            btn.style.display = "none";
            status.innerText = "Initializing... (0%)";

            // Resume Audio for Unity
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (AudioContext) { (new AudioContext()).resume(); }

            // Load the Unity Loader
            const script = document.createElement("script");
            script.src = loaderUrl;
            script.onload = () => {
                createUnityInstance(document.querySelector("#unity-canvas"), config, (progress) => {
                    status.innerText = "Loading Assets: " + Math.round(100 * progress) + "%";
                }).then((unityInstance) => {
                    document.getElementById("loading-overlay").style.display = "none";
                    window.unityInstance = unityInstance;
                    // Ensure the canvas gets focus
                    document.querySelector("#unity-canvas").focus();
                }).catch((err) => {
                    status.innerText = "Error loading game. Check console.";
                    console.error(err);
                });
            };
            document.body.appendChild(script);
        }
    </script>
</body>
</html>
