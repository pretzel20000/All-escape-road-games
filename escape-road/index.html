<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="25011401/theme/game.css">
    <title>Escape Road</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #unity-container { width: 100%; height: 100%; position: absolute; background: #000; }
        #unity-canvas { width: 100%; height: 100%; }
        /* Click to Play Overlay */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 999; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; color: white; font-family: sans-serif;
        }
        .play-button {
            padding: 15px 30px; font-size: 24px; background: #ff4400; color: white;
            border: none; border-radius: 50px; font-weight: bold; cursor: pointer;
        }
    </style>

    <script>
        // 1. SHIELD AGAINST REDIRECTS
        window.onbeforeunload = function() { return false; };
        // Overwrite location methods so the game can't force a redirect
        const noop = () => { console.log("Redirect blocked."); };
        Object.defineProperty(window.location, 'replace', { value: noop });
        Object.defineProperty(window.location, 'assign', { value: noop });

        // 2. BULLETPROOF MOCK SDK
        // This satisfies the "SetParam" and "GmSoft" errors in your console
        window.GmSoft = {
            Init: function() { return Promise.resolve(); },
            SetParam: function(a) { 
                console.log("SDK: SetParam received:", a); 
                return true; 
            },
            ShowAd: function(type, callback) {
                console.log("SDK: Ad requested - skipping");
                if (callback) callback();
                else if (typeof type === 'function') type();
            },
            LogEvent: function(ev) { console.log("SDK: Event logged:", ev); },
            GetParam: function() { return "default"; }
        };

        // 3. FAKE FIREBASE (Stops analytics crashes)
        window.firebase = {
            initializeApp: function() { 
                return { analytics: () => ({ logEvent: () => {} }), firestore: () => {}, auth: () => {} }; 
            }
        };
    </script>
</head>

<body>
    <div id="unity-container">
        <canvas id="unity-canvas"></canvas>
    </div>

    <!-- Overlay to fix AudioContext and ensure the game starts -->
    <div id="overlay" onclick="startGame()">
        <img src="25011401/logo.png" style="width: 200px; margin-bottom: 20px;">
        <button class="play-button">CLICK TO PLAY</button>
        <p>Loading may take a moment...</p>
    </div>

    <script>
        var versionFolder = "25011401/";
        var buildUrl = versionFolder + "Build";
        var loaderUrl = buildUrl + "/escape-road-v25011401.loader.js";

        var config = {
            dataUrl: buildUrl + "/escape-road-v25011401.data.unityweb",
            frameworkUrl: buildUrl + "/escape-road-v25011401.framework.js.unityweb",
            codeUrl: buildUrl + "/escape-road-v25011401.wasm.unityweb",
            streamingAssetsUrl: versionFolder + "StreamingAssets",
            companyName: "LocalHost",
            productName: "Escape Road",
            productVersion: "25011401",
            // Security bypasses
            eventLog: false,
            buildAPI: ""
        };

        var canvas = document.querySelector("#unity-canvas");
        var overlay = document.querySelector("#overlay");

        function startGame() {
            overlay.style.display = "none";
            // Check if AudioContext needs resuming
            if (window.AudioContext || window.webkitAudioContext) {
                var context = new (window.AudioContext || window.webkitAudioContext)();
                context.resume();
            }

            var script = document.createElement("script");
            script.src = loaderUrl;
            script.onload = () => {
                createUnityInstance(canvas, config, (progress) => {
                    // You can add a progress bar here if you like
                }).then((unityInstance) => {
                    window.unityInstance = unityInstance;
                    console.log("Game Loaded Successfully");
                }).catch((message) => {
                    console.error("Unity Load Error:", message);
                });
            };
            document.body.appendChild(script);
        }
    </script>
</body>
</html>
