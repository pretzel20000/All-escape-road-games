<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="25011401/theme/game.css">
    <title>Escape Road</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; height: 100vh; width: 100vw; }
        #unity-container { width: 100%; height: 100%; position: absolute; background: #000; }
        #unity-canvas { width: 100% !important; height: 100% !important; }
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 999; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; color: white; font-family: sans-serif;
        }
        .play-btn {
            padding: 15px 35px; font-size: 22px; background: #ff4400; 
            color: white; border: none; border-radius: 50px; cursor: pointer;
        }
        /* Hidden dummy elements to stop "addEventListener" errors */
        #banner-container, #more-games-btn, #ads-container { display: none; visibility: hidden; }
    </style>

    <script>
        // 1. INVINCIBLE MOCK SDK
        // We use "arguments" based functions so they accept 0, 1, or 100 parameters without crashing.
        window.GmSoft = {
            Init: function() { return Promise.resolve(); },
            SetParam: function() { 
                console.log("SDK: SetParam triggered"); 
                return "true"; 
            },
            GetParam: function() { return "true"; },
            ShowAd: function(cb) { 
                console.log("SDK: Ad skipped"); 
                if (typeof cb === 'function') cb(); 
                if (arguments[1] && typeof arguments[1] === 'function') arguments[1]();
            },
            LogEvent: function() { },
            PauseGame: function() { },
            ResumeGame: function() { }
        };

        // 2. FAKE FIREBASE
        window.firebase = {
            initializeApp: function() { 
                return { analytics: () => ({ logEvent: () => {} }), firestore: () => {}, auth: () => {} }; 
            }
        };

        // 3. ANTI-REDIRECT SYSTEM
        // Instead of redefining 'replace' (which caused a crash), we just watch the URL.
        const originUrl = window.location.href;
        window.onbeforeunload = null; // Kill the "Changes not saved" popup
        
        setInterval(() => {
            if (window.location.href !== originUrl && !window.location.href.includes(window.location.hostname)) {
                console.warn("Redirect blocked.");
                window.stop();
                window.location.href = originUrl;
            }
        }, 100);
    </script>
</head>

<body>
    <!-- Dummy elements to satisfy obfuscated scripts -->
    <div id="banner-container"></div>
    <div id="ads-container"></div>
    <div id="more-games-btn"></div>

    <div id="unity-container">
        <canvas id="unity-canvas"></canvas>
    </div>

    <div id="loading-overlay" onclick="startLoading()">
        <img src="25011401/logo.png" style="width: 200px; margin-bottom: 20px;">
        <div id="status-text" style="margin-bottom: 20px;">Click to Play</div>
        <button class="play-btn" id="load-btn">START</button>
    </div>

    <script>
        const buildFolder = "25011401/Build";
        const loaderUrl = buildFolder + "/escape-road-v25011401.loader.js";

        const config = {
            dataUrl: buildFolder + "/escape-road-v25011401.data.unityweb",
            frameworkUrl: buildFolder + "/escape-road-v25011401.framework.js.unityweb",
            codeUrl: buildFolder + "/escape-road-v25011401.wasm.unityweb",
            streamingAssetsUrl: "25011401/StreamingAssets",
            companyName: "DefaultCompany",
            productName: "Escape Road",
            productVersion: "25011401",
            devicePixelRatio: 1,
            eventLog: false,
            buildAPI: ""
        };

        function startLoading() {
            const btn = document.getElementById("load-btn");
            const status = document.getElementById("status-text");
            btn.style.display = "none";
            status.innerText = "Connecting...";

            // Resume Audio Context
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (AudioContext) { const ctx = new AudioContext(); ctx.resume(); }

            const script = document.createElement("script");
            script.src = loaderUrl;
            script.onload = () => {
                createUnityInstance(document.querySelector("#unity-canvas"), config, (progress) => {
                    status.innerText = "Loading: " + Math.round(100 * progress) + "%";
                }).then((unityInstance) => {
                    document.getElementById("loading-overlay").style.display = "none";
                    window.unityInstance = unityInstance;
                    console.log("Ready.");
                }).catch((err) => {
                    console.error("Unity Error", err);
                });
            };
            document.body.appendChild(script);
        }
    </script>
</body>
</html>
